<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stub - Embed</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        /* The embed is a media player - nothing in it is meant to be
           selectable. Suppress selection everywhere so the double-tap-to
           -fullscreen gesture can't word-select the player chrome. */
        user-select: none;
        -webkit-user-select: none;
      }
      /* Belt-and-braces: even if a selection is somehow started, render
         it transparent so it never flashes blue. */
      ::selection {
        background: transparent;
      }
      ::-moz-selection {
        background: transparent;
      }
      html, body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
      }
      #app, #app > div {
        width: 100%;
        height: 100%;
      }
      #app > div > iframe {
        width: 100% !important;
        height: 100% !important;
        aspect-ratio: unset !important;
        border-radius: 0 !important;
      }
    </style>
  </head>
  <body>
    <!-- overlay baseline: clipped (invisible + pass-through) until @fkn/lib mounts the projector; display:none would keep the overlay invisible forever -->
    <iframe src="%VITE_WEB_ORIGIN%/api" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; clip-path: inset(100%);"></iframe>
    <div id="app"></div>
    <script type="module" src="/src/embed.tsx"></script>
  </body>
</html>
